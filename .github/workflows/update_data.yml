name: Monthly SCMD Update

on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install pandas requests

    - name: Download latest SCMD
      run: python scripts/download_scmd.py

    - name: Initialize DB
      run: python scripts/create_db.py

    - name: Create NICE table
      run: python scripts/create_nice_table.py

    - name: Load to DB
      run: python scripts/load_extra_months.py

    - name: Export CSVs
      run: python scripts/export_for_dashboard.py

    - name: Commit updated data
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git add -f data/processed/
        git commit -m "auto: monthly SCMD update $(date +'%Y-%m')" || echo "No changes"
        git push